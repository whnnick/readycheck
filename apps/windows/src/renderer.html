<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ReadyCheck Windows</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-surface="main">
    <main class="app-shell">
      <section class="hero glass">
        <div class="app-icon">✓</div>
        <div>
          <h1>ReadyCheck</h1>
          <p data-i18n="subtitle">Codex 配额状态与刷新控制。</p>
        </div>
        <span class="status-pill" id="connectionStatus">未连接</span>
      </section>

      <section class="toolbar glass">
        <button id="refreshButton" class="primary">刷新</button>
        <button id="releaseButton">检查更新</button>
        <label class="switch-row">
          <input type="checkbox" id="widgetVisible">
          <span>显示 widget</span>
        </label>
        <label class="switch-row">
          <input type="checkbox" id="widgetAlwaysOnTop">
          <span>置顶 widget</span>
        </label>
        <label class="select-row">
          <span>Widget 样式</span>
          <select id="widgetDisplayMode">
            <option value="minimal">极简</option>
            <option value="detailed">详细</option>
          </select>
        </label>
        <button id="resetWidgetButton">重置位置</button>
      </section>

      <section class="quota-card glass">
        <div class="section-heading">
          <h2>额度</h2>
          <span id="lastRefresh">尚未刷新</span>
        </div>
        <div id="quotaContent"></div>
      </section>

      <section class="settings-grid">
        <article class="glass panel">
          <h2>账号</h2>
          <div class="account-row">
            <p id="accountText">未连接</p>
            <div>
              <button id="connectButton" class="primary">连接</button>
              <button id="disconnectButton">断开</button>
            </div>
          </div>
          <p id="oauthStatusText" class="muted">Windows 预览版通过 Codex OAuth 授权，token 使用 Electron safeStorage 加密保存。刷新只读取用量数据，不调用模型。</p>
        </article>

        <article class="glass panel">
          <h2>偏好设置</h2>
          <label class="select-row block">
            <span>语言</span>
            <select id="language">
              <option value="zh-CN">中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <label class="select-row block">
            <span>刷新间隔</span>
            <select id="refreshInterval">
              <option value="1">1 分钟</option>
              <option value="3">3 分钟</option>
              <option value="5">5 分钟</option>
            </select>
          </label>
          <p class="muted">只做安全刷新，不调用模型。</p>
        </article>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
